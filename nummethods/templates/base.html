<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}NumMethods{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="{{ url_for('main.home') }}">NumMethods</a>

        <nav class="nav">
          {% for cat in NAV %}
          <div class="dropdown">
            <a class="nav__link" href="{{ url_for(cat.endpoint, **cat.args) }}">
              {{ cat.label }}
            </a>

            <div class="dropdown__menu">
              {% for m in cat.methods %}
              <a
                class="dropdown__item"
                href="{{ url_for('main.method_view', category=cat.args.category, method=m.slug) }}"
              >
                {{ m.label }}
              </a>
              {% endfor %}
            </div>
          </div>
          {% endfor %}
        </nav>

        <a
          class="btn btn--primary"
          href="#"
          aria-label="Detalles"
          id="open-details-btn"
          >Detalles</a
        >
      </div>
    </header>
    <div id="details-modal" class="details-modal">
      <div class="details-modal__overlay" id="details-overlay"></div>

      <div class="details-modal__content">
        <button
          class="details-modal__close"
          id="details-close"
          aria-label="Cerrar"
        >
          &times;
        </button>

        <div class="details-modal__header">
          <h2 id="details-method-title">Detalles del método</h2>
          <p id="details-method-subtitle">
            Información general del método seleccionado
          </p>
        </div>

        <div class="details-tabs">
          <button class="details-tab active" data-tab="params">
            Parámetros
          </button>
          <button class="details-tab" data-tab="errors">
            Errores / Condiciones
          </button>
          <button class="details-tab" data-tab="output">Salida</button>
        </div>

        <div class="details-body">
          <div id="details-params" class="details-panel active"></div>
          <div id="details-errors" class="details-panel"></div>
          <div id="details-output" class="details-panel"></div>
        </div>
      </div>
    </div>

    <main class="{% block main_class %}page{% endblock %}">
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/konva@9.3.6/konva.min.js"></script>
    <script src="{{ url_for('static', filename='JS/graph-konva.js') }}"></script>
    <script src="{{ url_for('static', filename='JS/fileValidation.js') }}"></script>
    <script src="{{ url_for('static', filename='JS/api_client.js') }}"></script>
    <script src="{{ url_for('static', filename='JS/plotter.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>
    <script src="{{ url_for('static', filename='JS/keyboard.js') }}"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const panel = document.getElementById("results-panel");
        const button = document.getElementById("toggle-results");

        if (!panel || !button) return;

        button.addEventListener("click", () => {
          panel.classList.toggle("expanded");

          if (panel.classList.contains("expanded")) {
            button.textContent = "Reducir";
          } else {
            button.textContent = "Expandir";
          }
        });
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const tooltip = document.getElementById("global-tooltip");
        const helpIcons = document.querySelectorAll(".help-icon");

        if (!tooltip) return;

        function showTooltip(icon) {
          const text = icon.dataset.tooltip;
          if (!text) return;

          tooltip.textContent = text;
          tooltip.classList.add("is-visible");
          tooltip.classList.remove("tooltip-left", "tooltip-right");

          const rect = icon.getBoundingClientRect();

          const tooltipWidth = 260;
          const spacing = 12;

          let left = rect.right + spacing;
          let top = rect.top + window.scrollY - 4;

          /* si no cabe a la derecha, mandarlo a la izquierda */
          if (left + tooltipWidth > window.innerWidth - 12) {
            left = rect.left - tooltipWidth - spacing;
            tooltip.classList.add("tooltip-left");
          } else {
            tooltip.classList.add("tooltip-right");
          }

          /* si tampoco cabe a la izquierda, centrarlo arriba */
          if (left < 12) {
            left = 12;
          }

          /* evitar que se salga por abajo */
          const tooltipHeight = tooltip.offsetHeight || 80;
          const maxTop =
            window.innerHeight + window.scrollY - tooltipHeight - 12;

          if (top > maxTop) {
            top = maxTop;
          }

          if (top < window.scrollY + 12) {
            top = window.scrollY + 12;
          }

          tooltip.style.left = `${left}px`;
          tooltip.style.top = `${top}px`;
        }

        function hideTooltip() {
          tooltip.classList.remove(
            "is-visible",
            "tooltip-left",
            "tooltip-right",
          );
        }

        helpIcons.forEach((icon) => {
          icon.addEventListener("mouseenter", () => showTooltip(icon));
          icon.addEventListener("mouseleave", hideTooltip);
          icon.addEventListener("focus", () => showTooltip(icon));
          icon.addEventListener("blur", hideTooltip);

          /* para móvil */
          icon.addEventListener("click", (e) => {
            e.stopPropagation();

            if (tooltip.classList.contains("is-visible")) {
              hideTooltip();
            } else {
              showTooltip(icon);
            }
          });
        });

        document.addEventListener("click", (e) => {
          if (!e.target.classList.contains("help-icon")) {
            hideTooltip();
          }
        });

        window.addEventListener("scroll", hideTooltip);
        window.addEventListener("resize", hideTooltip);
      });
    </script>
    <script src="{{ url_for('static', filename='JS/detalles_metodos.js') }}"></script>
  </body>
</html>
