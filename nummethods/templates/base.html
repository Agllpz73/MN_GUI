<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}NumMethods{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="{{ url_for('main.home') }}">NumMethods</a>

        <nav class="nav">
          {% for cat in NAV %}
          <div class="dropdown">
            <a class="nav__link" href="{{ url_for(cat.endpoint, **cat.args) }}">
              {{ cat.label }}
            </a>

            <div class="dropdown__menu">
              {% for m in cat.methods %}
              <a
                class="dropdown__item"
                href="{{ url_for('main.method_view', category=cat.args.category, method=m.slug) }}"
              >
                {{ m.label }}
              </a>
              {% endfor %}
            </div>
          </div>
          {% endfor %}
        </nav>

        <a class="btn btn--primary" href="#" aria-label="Detalles">Detalles</a>
      </div>
    </header>

    <main class="{% block main_class %}page{% endblock %}">
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/konva@9.3.6/konva.min.js"></script>
    <script src="{{ url_for('static', filename='js/graph-konva.js') }}"></script>
    <script src="{{ url_for('static', filename='js/fileValidation.js') }}"></script>
    <script src="{{ url_for('static', filename='JS/api_client.js') }}"></script>
    <script src="{{ url_for('static', filename='JS/plotter.js') }}"></script>

  </body>
</html>
