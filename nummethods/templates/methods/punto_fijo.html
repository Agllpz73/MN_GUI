<form method="POST" id="method-form">

  <label>Función f(x):</label>
  <input type="text" name="fx" required>

  <label>Valor inicial x₀: </label>
  <input type="number" step="any" name="x0" required>

  <label>Tolerancia (ε):</label>
  <input type="number" step="any" name="tol" required>

  <label>Iteraciones máximas:</label>
  <input type="number" name="max_iter" required>

  <button type="submit" onclick="solvePuntoFijo(event)">Calcular</button>

</form>
<div class="method-card">

  <div class="method-card-header">
    <div class="method-card-icon">i</div>
    <h3>Punto Fijo</h3>
  </div>

  <p>
    Método iterativo que transforma la ecuación original en una función de la forma x = g(x).
    La convergencia depende del comportamiento de la función transformada.
    
  </p>


    

</div>
