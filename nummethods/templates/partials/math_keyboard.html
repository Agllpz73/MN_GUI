<div class="math-keyboard">

  <div class="math-keyboard__group math-keyboard__group--vars">
    <button>x</button>
    <button>y</button>
    <button>&pi;</button>
    <button>log</button>

    <button>^</button>
    <button>√</button>
    <button>e</button>
    <button>ln</button>

    <button>sin</button>
    <button>cos</button>
    <button>tan</button>
    <button>ctg</button>

    <button>sec</button>
    <button>csc</button>
    <button>(</button>
    <button>)</button>
  </div>

  <div class="math-keyboard__group math-keyboard__group--nums">
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="op">+</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="op">−</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="op">×</button>

    <button>0</button>
    <button>.</button>
    <button class="back">⌫</button>
    <button class="op">÷</button>

    <button class="equal">=</button>
    <button class="clear">AC</button>
  </div>

</div>
